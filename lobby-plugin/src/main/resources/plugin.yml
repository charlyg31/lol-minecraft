name: LolMC-Lobby
version: 1.0.0
main: fr.lolmc.lobby.LobbyPlugin
api-version: '1.21'
description: Plugin lobby pour LolMC - runes, groupe, file d'attente

commands:
  lol:
    description: Ouvre le menu pré-game LoL
    aliases: [ll, lollobby, jouer]
    usage: /lol
    permission: lolmc.lobby
  party:
    description: Gérer son groupe
    aliases: [p]
    usage: /party <invite|accept|leave|info>
    permission: lolmc.lobby
  queue:
    description: Rejoindre/quitter la file
    aliases: [q, file]
    usage: /queue [leave]
    permission: lolmc.lobby

permissions:
  lolmc.lobby:
    description: Accès aux fonctionnalités lobby LoL
    default: true
