name: LolMC
version: 1.0.0
main: fr.lolmc.LolPlugin
api-version: '1.21'
description: League of Legends en Minecraft — 20 champions

commands:
  champion:
    description: Gère les champions LoL
    usage: /champion <pick|list|info> [args]
    aliases: [champ]

  shop:
    description: Ouvre la boutique LoL
    usage: /shop [gold|addgold <montant>]
    aliases: [boutique, b]

  team:
    description: Rejoindre une équipe (bleu/rouge)
    usage: /team <bleu|rouge|auto>
    aliases: [equipe]

  party:
    description: Gérer son groupe
    usage: /party <invite|accept|leave|info>
    aliases: [groupe, p]

  queue:
    description: Rejoindre la file d'attente
    usage: /queue [leave]
    aliases: [file, q]

  lol:
    description: Configuration de la carte (admin)
    usage: /lol <set|position|lane|start|stop>
    permission: lolmc.admin
