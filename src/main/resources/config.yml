# ═══════════════════════════════════════════════════════
# BRIDGE CROSS-SERVEUR (BungeeCord)
# ═══════════════════════════════════════════════════════
# Permet aux joueurs de configurer leurs runes, groupes
# et file d'attente depuis un serveur lobby séparé,
# puis d'être connectés automatiquement ici pour jouer.
#
# Prérequis :
#  1. BungeeCord avec ce serveur et le serveur lobby
#  2. "bungeecord: true" dans spigot.yml des deux serveurs
#  3. Le plugin LolMC-Lobby.jar installé sur le serveur lobby
#
bridge:
  enabled: false
  # Nom de ce serveur dans la config BungeeCord
  game-server: "lolmc-01"
  # Nom du serveur lobby dans la config BungeeCord
  lobby-server: "lobby"

# ═══════════════════════════════════════════════════════
# MONDE DE JEU
# ═══════════════════════════════════════════════════════
# Nom du monde Minecraft où se déroule la partie LoL.
# Les mécaniques du plugin (sbires, tourelles, brouillard,
# HUD...) ne s'activent que pour les joueurs dans ce monde.
# Cela permet d'avoir d'autres mondes sur le même serveur
# sans interférence (hub, monde de build, etc.).
world:
  # Nom du monde TEMPLATE (configuré une fois via /lol set, jamais utilisé en jeu)
  # Ce monde est copié pour chaque nouvelle instance de partie.
  template: "lolmc_template"
  # Préfixe des mondes d'instance (lolmc_game_1, lolmc_game_2…)
  # NE PAS modifier après le premier démarrage.
  instance-prefix: "lolmc_game_"
  # Nombre maximum de parties simultanées
  max-instances: 5
  # Nom exact du monde de jeu (dossier dans le répertoire serveur)
  name: "lolmc_template"
  # Monde lobby/hub (optionnel). Si renseigné, c'est ici que
  # les joueurs attendent, configurent leurs runes et forment
  # leurs groupes avant d'être envoyés dans le monde de jeu.
  lobby: "lobby"

# LoL MC — Configuration des textures de têtes
# Pour chaque champion, colle la valeur "Value" depuis :
# https://minecraft-heads.com/custom-heads/tag/League-of-Legends
# Cherche le nom du champion, clique dessus, copie le champ "Value" (base64)

heads:
  # TOP
  garen:       "PASTE_VALUE_HERE"
  malphite:    "PASTE_VALUE_HERE"
  darius:      "PASTE_VALUE_HERE"
  nasus:       "PASTE_VALUE_HERE"
  # JUNGLE
  warwick:     "PASTE_VALUE_HERE"
  amumu:       "PASTE_VALUE_HERE"
  masteryi:    "PASTE_VALUE_HERE"
  leesin:      "PASTE_VALUE_HERE"
  # MID
  annie:       "PASTE_VALUE_HERE"
  veigar:      "PASTE_VALUE_HERE"
  zed:         "PASTE_VALUE_HERE"
  yasuo:       "PASTE_VALUE_HERE"
  # SUPPORT
  morgana:     "PASTE_VALUE_HERE"
  leona:       "PASTE_VALUE_HERE"
  blitzcrank:  "PASTE_VALUE_HERE"
  janna:       "PASTE_VALUE_HERE"
  # ADC
  ashe:        "PASTE_VALUE_HERE"
  sivir:       "PASTE_VALUE_HERE"
  jinx:        "PASTE_VALUE_HERE"
  missfortune: "PASTE_VALUE_HERE"

# ═══════════════════════════════════════════════════════
# BUSHES (buissons) — zones d'invisibilité
# ═══════════════════════════════════════════════════════
# Liste des blocs qui forment un bush. Tout bloc de ce type
# (et les blocs identiques collés) constitue un buisson.
# Quand un joueur est dans/sur un bush, il est invisible pour
# les ennemis, SAUF si un ennemi est dans le même bush ou s'il
# vient de prendre des dégâts (révélé 5s).
bushes:
  blocks:
    - TALL_GRASS
    - LARGE_FERN
    - FERN
    - SWEET_BERRY_BUSH

# ═══════════════════════════════════════════════════════
# ÉCHELLE — conversion unités LoL → blocs Minecraft
# ═══════════════════════════════════════════════════════
# Toutes les portées AA des champions sont définies en unités LoL
# et converties automatiquement au démarrage.
# 1 bloc Minecraft = X unités LoL
# Valeur recommandée : 65 (défaut). Ajuster si les portées semblent
# trop grandes (augmenter) ou trop petites (diminuer) en jeu.
scale:
  lol-units-per-block: 65

# ═══════════════════════════════════════════════════════
# TOURELLES — portée d'attaque (mêmes valeurs pour toutes)
# ═══════════════════════════════════════════════════════
# Zone d'attaque en forme de CYLINDRE depuis le point de pose du schématique.
turrets:
  # Rayon horizontal de la zone de détection (en blocs)
  attack-radius: 8
  # Hauteur de la zone de DÉTECTION (cylindre, en blocs au-dessus/dessous du point de pose)
  detection-height: 6
  # Hauteur d'où part visuellement l'ANIMATION du tir (en blocs au-dessus du point de pose)
  beam-height: 6
  # Dégâts de base d'un tir
  base-damage: 150

# ═══════════════════════════════════════════════════════
# BASE DE DONNÉES
# ═══════════════════════════════════════════════════════
database:
  # Type de base : "sqlite" (local, simple), "mysql", ou "mongodb"
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: lolmc
    user: root
    password: ""

# ═══════════════════════════════════════════════════════
# API WEB (stats des joueurs)
# ═══════════════════════════════════════════════════════
# IMPORTANT: nécessite un port ouvert sur l'hébergeur pour être
# accessible depuis un site web externe.
api:
  enabled: false
  port: 8080

# ═══════════════════════════════════════════════════════
# FOG OF WAR (brouillard de guerre)
# ═══════════════════════════════════════════════════════
fog:
  enabled: true
  # Distance de vision en blocs (les ennemis au-delà sont invisibles)
  vision-range: 30

minimap:
  center-x: 0      # centre X de ta carte LoL (bloc)
  center-z: 0      # centre Z
  scale: FARTHEST   # CLOSEST=128b CLOSE=256 NORMAL=512 FAR=1024 FARTHEST=2048
