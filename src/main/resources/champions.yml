# ─────────────────────────────────────────────────────────────
# champions.yml — valeurs d'equilibrage rechargeables a chaud
# Modifie une valeur puis fais /lol reload (pas besoin de recompiler).
#
# Cle = identifiant du sort (q_<champion>, etc.).
#   cooldown : liste par rang (5 pour Q/W/E, 3 pour R)
#   cost     : cout mana/energie (0 = gratuit)
#   base     : degats de base par rang (si le sort en a)
# Cle absente => la valeur codee en dur s'applique (repli sur).
# (Les ratios AD/AP seront ajoutes dans un prochain lot.)
# ─────────────────────────────────────────────────────────────

