# ─────────────────────────────────────────────────────────────
# champions.yml — valeurs d'equilibrage rechargeables a chaud
# Modifie une valeur puis fais /lol reload (pas besoin de recompiler).
#
# Cle = identifiant du sort (q_<champion>, w_<...>, etc.).
#   cooldown : liste par rang (5 valeurs pour Q/W/E, 3 pour R)
#   cost     : cout en mana/energie (0 = gratuit)
# Si une cle est absente ou supprimee, la valeur codee en dur s'applique.
# (Les degats de base et ratios seront ajoutes ici dans un prochain lot.)
# ─────────────────────────────────────────────────────────────

